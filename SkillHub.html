<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillHub · Mozia agent skills directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<style>
  html, body { background: #fafafa; color: #171717; }
  body { font-family: 'Inter', ui-sans-serif, system-ui, 'PingFang SC', sans-serif; -webkit-font-smoothing: antialiased; }
  .font-mono, code, pre, kbd, samp { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-variant-ligatures: none; }

  /* Markdown body */
  .md-body { color: #262626; font-size: 14px; line-height: 1.65; }
  .md-body h1, .md-body h2, .md-body h3, .md-body h4 { font-weight: 600; letter-spacing: -0.01em; color: #0a0a0a; }
  .md-body h1 { font-size: 22px; margin: 0 0 14px; }
  .md-body h2 { font-size: 17px; margin: 28px 0 10px; padding-top: 10px; border-top: 1px solid #f0f0f0; }
  .md-body h3 { font-size: 14.5px; margin: 20px 0 8px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; color: #525252; }
  .md-body p { margin: 10px 0; }
  .md-body ul, .md-body ol { margin: 10px 0; padding-left: 22px; }
  .md-body li { margin: 4px 0; }
  .md-body ul li { list-style: square; }
  .md-body ol li { list-style: decimal; }
  .md-body code { background: #f5f5f5; padding: 1px 5px; font-size: 12.5px; border-radius: 2px; }
  .md-body pre { background: #0a0a0a; color: #fafafa; padding: 14px 16px; border-radius: 0; margin: 14px 0; overflow-x: auto; font-size: 12.5px; line-height: 1.6; position: relative; }
  .md-body pre::before { content: attr(data-lang); position: absolute; top: 6px; right: 10px; font-size: 10px; color: #737373; text-transform: uppercase; letter-spacing: 0.14em; }
  .md-body pre code { background: transparent; padding: 0; color: inherit; font-size: inherit; }
  .md-body strong { color: #0a0a0a; font-weight: 600; }

  /* Docs prose */
  .prose-docs { color: #262626; font-size: 15px; line-height: 1.7; }
  .prose-docs h2 { font-size: 20px; font-weight: 600; margin: 36px 0 14px; padding-bottom: 8px; border-bottom: 1px solid #e5e5e5; letter-spacing: -0.01em; }
  .prose-docs p { margin: 14px 0; }
  .prose-docs ul, .prose-docs ol { margin: 14px 0; padding-left: 22px; }
  .prose-docs ul li { list-style: square; margin: 6px 0; }
  .prose-docs ol li { list-style: decimal; margin: 6px 0; }
  .prose-docs code { font-family: 'JetBrains Mono', monospace; background: #f5f5f5; padding: 1.5px 5px; font-size: 13px; border-radius: 2px; }
  .prose-docs a { color: var(--accent, #2563eb); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }
  .prose-docs a:hover { text-decoration-thickness: 2px; }
  .prose-docs strong { font-weight: 600; color: #0a0a0a; }

  /* Scrollbar (subtle) */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }

  /* Selection */
  ::selection { background: #111; color: #fff; }

  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/markdown.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/list.jsx"></script>
<script type="text/babel" src="src/detail.jsx"></script>
<script type="text/babel" src="src/docs.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
